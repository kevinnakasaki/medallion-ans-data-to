services:
  minio:
    image: minio/minio
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --address ":9000" --console-address ":9001"
    restart: always

  minio-mc:
    image: minio/mc
    env_file: .env
    depends_on: [minio]
    entrypoint: ["/bin/sh", "/scripts/minio_setup.sh"]
    volumes:
      - ./scripts:/scripts

  prefect-db:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prefect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  prefect-server:
    image: prefecthq/prefect:3-python3.13
    env_file: .env
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      - PREFECT_UI_API_URL=http://localhost:4200/api
    depends_on:
      prefect-db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: [prefect-server, minio]
    env_file: .env
    volumes:
      - ./src:/app/src
    restart: always

  jupyter:
    image: quay.io/jupyter/base-notebook:latest
    ports:
      - "8888:8888"
    env_file: .env
    volumes:
      - ./notebooks:/home/jovyan/work
    command: start-notebook.py --NotebookApp.token=''
    depends_on: [minio]
